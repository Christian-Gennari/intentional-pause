<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e8efeb">
  <meta name="description" content="A quiet breathing pause followed by one clear intention.">
  <title>Pause</title>

  <style>
    :root{
      --bg-1:#f2f5f1;
      --bg-2:#e1ebe5;
      --bg-3:#cedbd3;
      --ink:#1e2b24;
      --muted:#64746b;
      --faint:#809188;
      --line:rgba(30,43,36,.105);
      --glass:rgba(255,255,255,.34);
      --glass-strong:rgba(255,255,255,.52);
      --field-a:rgba(196,218,204,.72);
      --field-b:rgba(132,169,146,.42);
      --field-c:rgba(230,239,233,.70);
      --field-d:rgba(96,130,112,.18);
      --focus:rgba(83,123,101,.20);
      --shadow:0 44px 130px rgba(49,72,59,.15);
      --inhale-duration:4s;
      --exhale-duration:6s;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg-1:#111714;
        --bg-2:#18231d;
        --bg-3:#26342b;
        --ink:#eef5f1;
        --muted:#a6b7ad;
        --faint:#82958b;
        --line:rgba(238,245,241,.11);
        --glass:rgba(255,255,255,.045);
        --glass-strong:rgba(255,255,255,.075);
        --field-a:rgba(132,167,148,.24);
        --field-b:rgba(97,132,112,.22);
        --field-c:rgba(222,239,229,.14);
        --field-d:rgba(176,212,192,.12);
        --focus:rgba(164,199,178,.16);
        --shadow:0 44px 130px rgba(0,0,0,.30);
      }
    }

    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      min-height:100svh;
      overflow:hidden;
      color:var(--ink);
      font-family:"Avenir Next", Avenir, "Gill Sans", "Trebuchet MS", "Segoe UI", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.62), transparent 31rem),
        radial-gradient(circle at 87% 18%, rgba(170,202,184,.32), transparent 30rem),
        radial-gradient(circle at 72% 88%, rgba(103,137,118,.18), transparent 34rem),
        linear-gradient(150deg,var(--bg-1),var(--bg-2) 52%,var(--bg-3));
    }

    .wash,.grain,.vignette{
      position:fixed;
      inset:0;
      pointer-events:none;
    }

    .wash{
      opacity:.72;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(255,255,255,.22), transparent 25rem),
        radial-gradient(ellipse at 50% 52%, rgba(220,235,226,.34), transparent 40rem);
      filter:blur(28px);
    }

    .grain{
      opacity:.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.82'/%3E%3C/svg%3E");
      mix-blend-mode:multiply;
    }

    .vignette{
      background:radial-gradient(circle at center, transparent 46%, rgba(0,0,0,.06) 100%);
      opacity:.5;
    }

    main{
      position:relative;
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .screen{
      position:absolute;
      width:min(760px, calc(100vw - 32px));
      text-align:center;
      transition:opacity 900ms cubic-bezier(.22,.8,.2,1), transform 900ms cubic-bezier(.22,.8,.2,1), filter 900ms ease;
    }

    .screen[aria-hidden="true"]{
      opacity:0;
      transform:translateY(14px) scale(.985);
      filter:blur(10px);
      pointer-events:none;
    }

    .screen[aria-hidden="false"]{
      opacity:1;
      transform:translateY(0) scale(1);
      filter:blur(0);
    }

    .card{
      padding:32px 28px;
      border:1px solid var(--line);
      border-radius:34px;
      background:linear-gradient(180deg, var(--glass-strong), var(--glass));
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      box-shadow:var(--shadow);
    }

    .breath-card{padding-top:38px;padding-bottom:34px}

    .eyebrow{
      margin:0 0 24px;
      color:var(--muted);
      font-size:.78rem;
      font-weight:600;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .breath-stage{
      display:grid;
      justify-items:center;
      gap:38px;
    }

    .field-space{
      position:relative;
      width:min(68vw, 280px);
      height:min(68vw, 280px);
      display:grid;
      place-items:center;
      isolation:isolate;
    }

    .breath-target-ring{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:1px dashed var(--faint);
      opacity:.25;
      pointer-events:none;
      animation:rotate-target 40s linear infinite;
    }

    @keyframes rotate-target{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    .breathing-field{
      position:absolute;
      width:98%;
      height:98%;
      border-radius:50%;
      transform:scale(.6);
      opacity:.8;
      display:grid;
      place-items:center;
      transition:opacity 500ms ease;
      will-change:transform, opacity;
    }

    .breathing-field.inhale{animation:field-inhale var(--inhale-duration) cubic-bezier(.36,.07,.19,.97) forwards}
    .breathing-field.exhale{animation:field-exhale var(--exhale-duration) cubic-bezier(.36,.07,.19,.97) forwards}

    @keyframes field-inhale{
      from{transform:scale(.55);opacity:.75}
      to{transform:scale(.95);opacity:1}
    }

    @keyframes field-exhale{
      from{transform:scale(.95);opacity:1}
      to{transform:scale(.55);opacity:.75}
    }

    .circle-glow{
      position:absolute;
      inset:-12px;
      border-radius:50%;
      background:radial-gradient(circle, var(--field-a) 0%, transparent 70%);
      opacity:.52;
      filter:blur(14px);
      animation:glow-pulse 4s ease-in-out infinite alternate;
    }

    @keyframes glow-pulse{
      from{transform:scale(.94);opacity:.42}
      to{transform:scale(1.06);opacity:.68}
    }

    .circle-ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:1.5px solid var(--glass-strong);
      background:var(--glass);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:inset 0 2px 4px rgba(255,255,255,.15), 0 8px 32px var(--shadow);
    }

    .circle-core{
      position:absolute;
      inset:12%;
      border-radius:50%;
      background:linear-gradient(135deg, var(--field-a) 0%, var(--field-b) 100%);
      box-shadow:inset 0 -4px 10px rgba(0,0,0,.04), 0 4px 12px rgba(100,135,114,.12);
    }

    .instruction{
      min-height:1.5em;
      margin:0 0 16px;
      color:var(--ink);
      font-size:clamp(1.18rem, 2vw, 1.5rem);
      font-weight:400;
      letter-spacing:.01em;
    }

    .instruction strong{font-weight:600}

    .progress{
      display:flex;
      justify-content:center;
      gap:9px;
    }

    .progress span{
      width:7px;
      height:7px;
      border-radius:999px;
      background:var(--faint);
      opacity:.22;
      transition:opacity 450ms ease, transform 450ms ease, background 450ms ease;
    }

    .progress span.active{
      opacity:.72;
      transform:scale(1.14);
      background:var(--ink);
    }

    .reflection,.resolution{padding:18px 0 12px}

    h1{
      margin:0;
      font-size:clamp(2rem, 5.4vw, 4.7rem);
      line-height:1.02;
      letter-spacing:-.055em;
      font-weight:520;
    }

    .sub{
      max-width:36rem;
      margin:22px auto 0;
      color:var(--muted);
      font-size:1.02rem;
      line-height:1.55;
      letter-spacing:.005em;
    }

    .answer-wrap{
      width:min(520px, 100%);
      margin:42px auto 0;
    }

    input{
      width:100%;
      border:0;
      border-bottom:1px solid var(--line);
      border-radius:0;
      background:transparent;
      color:var(--ink);
      padding:15px 6px 13px;
      text-align:center;
      font:inherit;
      font-size:1.18rem;
      font-weight:400;
      outline:none;
      transition:border-color 180ms ease, background 180ms ease;
    }

    input::placeholder{color:var(--muted);opacity:.72}
    input:focus{border-bottom-color:rgba(69,104,86,.52);background:linear-gradient(180deg, transparent, var(--focus))}

    .hint{
      margin:12px 0 0;
      color:var(--muted);
      font-size:.74rem;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .intention{
      margin:0 auto;
      max-width:42rem;
      font-size:clamp(1.65rem, 4.4vw, 3.6rem);
      line-height:1.13;
      letter-spacing:-.045em;
      font-weight:520;
    }

    .intention::before{content:"“"}
    .intention::after{content:"”"}

    .closing{
      margin:18px 0 0;
      color:var(--muted);
      font-size:1rem;
      line-height:1.5;
    }

    .restart,.sound-toggle{
      position:fixed;
      border:1px solid var(--line);
      background:rgba(255,255,255,.22);
      color:var(--muted);
      font:inherit;
      font-size:.74rem;
      letter-spacing:.02em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:0 10px 30px rgba(45,60,51,.08);
      cursor:pointer;
      transition:opacity 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .restart{
      right:16px;
      bottom:16px;
      padding:9px 12px;
      border-radius:999px;
      opacity:.45;
    }

    .sound-toggle{
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      padding:10px 14px;
      border-radius:999px;
      opacity:0;
      pointer-events:none;
    }

    .sound-toggle.show{opacity:.85;pointer-events:auto}

    .restart:hover,.sound-toggle:hover,.restart:focus-visible,.sound-toggle:focus-visible{
      transform:translateY(-1px);
      background:rgba(255,255,255,.34);
      opacity:.95;
    }

    .sound-toggle:hover,.sound-toggle:focus-visible{transform:translateX(-50%) translateY(-1px)}
    .restart:focus-visible,.sound-toggle:focus-visible{outline:2px solid var(--focus);outline-offset:2px}

    @media (max-width:560px){
      .card{padding:24px 18px;border-radius:28px}
      .breath-card{padding-top:28px;padding-bottom:24px}
      .field-space{width:min(74vw, 240px);height:min(74vw, 240px)}
      .answer-wrap{margin-top:34px}
      .sub{font-size:.96rem}
    }

    @media (prefers-reduced-motion: reduce){
      .screen{transition-duration:120ms;filter:none !important}
      .wash{filter:none}
      .breathing-field.inhale{animation:gentle-inhale var(--inhale-duration) linear forwards}
      .breathing-field.exhale{animation:gentle-exhale var(--exhale-duration) linear forwards}
      .circle-glow{animation:none !important}
      .breath-target-ring{animation:none !important}
      @keyframes gentle-inhale{from{transform:scale(.6)}to{transform:scale(.95)}}
      @keyframes gentle-exhale{from{transform:scale(.95)}to{transform:scale(.6)}}
    }
  </style>
</head>
<body>
  <div class="wash" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main>
    <section class="screen" id="breathScreen" aria-hidden="false">
      <div class="card breath-card">
        <p class="eyebrow">A brief return</p>
        <div class="breath-stage">
          <div class="field-space" aria-hidden="true">
            <div class="breath-target-ring"></div>
            <div class="breathing-field" id="breathingField">
              <div class="circle-glow"></div>
              <div class="circle-ring"></div>
              <div class="circle-core"></div>
            </div>
          </div>

          <div>
            <p class="instruction" id="instruction">&nbsp;</p>
            <div class="progress" aria-label="Two breaths">
              <span id="dot1"></span>
              <span id="dot2"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="reflectionScreen" aria-hidden="true">
      <div class="card">
        <div class="reflection">
          <p class="eyebrow">Now that there is a little space</p>
          <h1>What is important right now?</h1>
          <p class="sub">Not everything. Just the next thing that deserves your attention.</p>

          <form class="answer-wrap" id="intentionForm">
            <label for="intention" style="position:absolute;left:-9999px">What is important right now?</label>
            <input id="intention" name="intention" type="text" autocomplete="off" maxlength="160" placeholder="Name one thing">
            <p class="hint">Press Enter</p>
          </form>
        </div>
      </div>
    </section>

    <section class="screen" id="resolutionScreen" aria-hidden="true">
      <div class="card">
        <div class="resolution">
          <p class="eyebrow">This is enough for now</p>
          <blockquote class="intention" id="intentionText"></blockquote>
          <p class="closing">Close this tab and give it your attention.</p>
        </div>
      </div>
    </section>
  </main>

  <button class="restart" id="restart" type="button" aria-label="Restart breathing exercise">restart</button>
  <button class="sound-toggle" id="soundToggle" type="button" aria-label="Enable background sound">tap for sound</button>

  <script>
    const SETTINGS = {
      pauseBeforeStart: 1000,
      inhaleDuration: 4000,
      holdDuration: 2000,
      exhaleDuration: 6000,
      breaths: 2
    };

    document.documentElement.style.setProperty("--inhale-duration", `${SETTINGS.inhaleDuration}ms`);
    document.documentElement.style.setProperty("--exhale-duration", `${SETTINGS.exhaleDuration}ms`);

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    const breathScreen = document.getElementById("breathScreen");
    const reflectionScreen = document.getElementById("reflectionScreen");
    const resolutionScreen = document.getElementById("resolutionScreen");
    const breathingField = document.getElementById("breathingField");
    const instruction = document.getElementById("instruction");
    const form = document.getElementById("intentionForm");
    const input = document.getElementById("intention");
    const intentionText = document.getElementById("intentionText");
    const restart = document.getElementById("restart");
    const soundToggle = document.getElementById("soundToggle");
    const dots = [document.getElementById("dot1"), document.getElementById("dot2")];

    let runId = 0;

    function showScreen(screen){
      [breathScreen, reflectionScreen, resolutionScreen].forEach(item => {
        item.setAttribute("aria-hidden", item === screen ? "false" : "true");
      });
      updateAudioMood(screen);
    }

    function animateField(className){
      breathingField.className = "breathing-field";
      void breathingField.offsetWidth;
      breathingField.classList.add(className);
    }

    async function runBreathing(){
      const thisRun = ++runId;
      showScreen(breathScreen);
      input.value = "";
      intentionText.textContent = "";
      instruction.innerHTML = "&nbsp;";
      dots.forEach(dot => dot.classList.remove("active"));
      breathingField.className = "breathing-field";

      await sleep(SETTINGS.pauseBeforeStart);
      if (thisRun !== runId) return;

      for (let breath = 0; breath < SETTINGS.breaths; breath++){
        dots.forEach((dot, i) => dot.classList.toggle("active", i === breath));

        instruction.innerHTML = "<strong>Breathe in</strong>";
        animateField("inhale");
        audioOnInhale();
        await sleep(SETTINGS.inhaleDuration);
        if (thisRun !== runId) return;

        instruction.innerHTML = "<strong>Hold</strong>";
        await sleep(SETTINGS.holdDuration);
        if (thisRun !== runId) return;

        instruction.innerHTML = "<strong>Breathe out</strong>";
        animateField("exhale");
        audioOnExhale();
        await sleep(SETTINGS.exhaleDuration);
        if (thisRun !== runId) return;
      }

      instruction.textContent = "";
      dots.forEach(dot => dot.classList.remove("active"));
      audioSoftChime();
      await sleep(650);
      if (thisRun !== runId) return;

      showScreen(reflectionScreen);
      await sleep(700);
      input.focus();
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      const value = input.value.trim();
      if (!value){
        input.focus();
        return;
      }
      intentionText.textContent = value;
      showScreen(resolutionScreen);
    });

    restart.addEventListener("click", runBreathing);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && resolutionScreen.getAttribute("aria-hidden") === "false"){
        showScreen(reflectionScreen);
        setTimeout(() => input.focus(), 350);
      }
    });

    /* ---------- Audio: binaural bed + zen breath cues ---------- */

    let audioCtx;
    let masterGain, bedGain, bedFilter;
    let leftTone, rightTone, bedNoise, slowLfo, slowLfoGain;
    let audioReady = false;
    let audioUnlocked = false;
    let soundToggleClick = false;

    function createPinkishNoiseBuffer(context, seconds = 2){
      const length = context.sampleRate * seconds;
      const buffer = context.createBuffer(1, length, context.sampleRate);
      const data = buffer.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i=0; i<length; i++){
        const white = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + white * 0.0555179;
        b1 = 0.99332 * b1 + white * 0.0750759;
        b2 = 0.96900 * b2 + white * 0.1538520;
        b3 = 0.86650 * b3 + white * 0.3104856;
        b4 = 0.55000 * b4 + white * 0.5329522;
        b5 = -0.7616 * b5 - white * 0.0168980;
        data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.055;
        b6 = white * 0.115926;
      }
      return buffer;
    }

    function setupAudio(){
      if (audioReady) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.0001;
      masterGain.connect(audioCtx.destination);

      bedGain = audioCtx.createGain();
      bedGain.gain.value = 0.18;
      bedGain.connect(masterGain);

      const merger = audioCtx.createChannelMerger(2);
      const leftGain = audioCtx.createGain();
      const rightGain = audioCtx.createGain();
      leftGain.gain.value = 0.12;
      rightGain.gain.value = 0.12;

      leftTone = audioCtx.createOscillator();
      rightTone = audioCtx.createOscillator();
      leftTone.type = "sine";
      rightTone.type = "sine";
      leftTone.frequency.value = 174;
      rightTone.frequency.value = 178;
      leftTone.connect(leftGain).connect(merger, 0, 0);
      rightTone.connect(rightGain).connect(merger, 0, 1);
      merger.connect(bedGain);

      bedFilter = audioCtx.createBiquadFilter();
      bedFilter.type = "lowpass";
      bedFilter.frequency.value = 540;
      bedFilter.Q.value = 0.35;

      const bedNoiseGain = audioCtx.createGain();
      bedNoiseGain.gain.value = 0.08;
      bedNoise = audioCtx.createBufferSource();
      bedNoise.buffer = createPinkishNoiseBuffer(audioCtx, 3);
      bedNoise.loop = true;
      bedNoise.connect(bedFilter).connect(bedNoiseGain).connect(bedGain);

      slowLfo = audioCtx.createOscillator();
      slowLfo.type = "sine";
      slowLfo.frequency.value = 0.055;
      slowLfoGain = audioCtx.createGain();
      slowLfoGain.gain.value = 18;
      slowLfo.connect(slowLfoGain).connect(bedFilter.frequency);

      leftTone.start();
      rightTone.start();
      bedNoise.start();
      slowLfo.start();

      audioReady = true;
    }

    async function tryStartAudio(){
      if (!audioReady) setupAudio();
      try{
        if (audioCtx.state !== "running") await audioCtx.resume();
        audioUnlocked = true;
        soundToggle.classList.remove("show");
        const now = audioCtx.currentTime;
        masterGain.gain.cancelScheduledValues(now);
        masterGain.gain.setValueAtTime(Math.max(masterGain.gain.value, 0.0001), now);
        masterGain.gain.linearRampToValueAtTime(0.82, now + 1.8);
      }catch(error){
        soundToggle.classList.add("show");
      }
    }

    function rampParam(param, value, seconds){
      const now = audioCtx.currentTime;
      param.cancelScheduledValues(now);
      param.setValueAtTime(Math.max(param.value || 0.0001, 0.0001), now);
      param.linearRampToValueAtTime(value, now + seconds);
    }

    function updateAudioMood(screen){
      if (!audioReady || !audioUnlocked) return;
      if (screen === breathScreen){
        rampParam(bedGain.gain, 0.18, 1.2);
      }else if (screen === reflectionScreen){
        rampParam(bedGain.gain, 0.10, 1.4);
      }else{
        rampParam(bedGain.gain, 0.08, 1.4);
      }
    }

    function connectWithPan(source, panValue, destination){
      if (audioCtx.createStereoPanner && panValue !== 0){
        const panner = audioCtx.createStereoPanner();
        panner.pan.value = panValue;
        source.connect(panner);
        panner.connect(destination);
      }else{
        source.connect(destination);
      }
    }

    const TEMPLE_PARTIALS = [
      { ratio: 1.0,  gain: 0.8 },
      { ratio: 2.01, gain: 0.35 },
      { ratio: 2.98, gain: 0.22 },
      { ratio: 4.15, gain: 0.15 },
      { ratio: 5.38, gain: 0.08 },
      { ratio: 6.21, gain: 0.04 }
    ];

    function triggerTemplePing({ time = audioCtx.currentTime, baseFreq, partials, volume, decay, pan = 0 }){
      const voiceGain = audioCtx.createGain();
      const voiceFilter = audioCtx.createBiquadFilter();
      voiceFilter.type = "lowpass";
      
      // Bell filter sweep: starts bright and relaxes into warmth
      voiceFilter.frequency.setValueAtTime(4500, time);
      voiceFilter.frequency.exponentialRampToValueAtTime(1000, time + decay * 0.85);
      voiceFilter.Q.value = 0.8;

      voiceGain.gain.setValueAtTime(0.0001, time);
      voiceGain.gain.linearRampToValueAtTime(volume, time + 0.03); // Soft, clean attack (30ms) to avoid clicks
      voiceGain.gain.exponentialRampToValueAtTime(0.0001, time + decay);
      voiceGain.connect(voiceFilter);
      connectWithPan(voiceFilter, pan, masterGain);

      const oscs = [];
      const oscGains = [];

      partials.forEach(({ ratio, gain }) => {
        const osc = audioCtx.createOscillator();
        const pGain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(baseFreq * ratio, time);
        
        pGain.gain.setValueAtTime(gain, time);
        // Higher partials decay faster for realistic bell characteristics
        const pDecay = decay * Math.max(0.15, Math.pow(ratio, -0.65));
        pGain.gain.exponentialRampToValueAtTime(0.0001, time + pDecay);

        osc.connect(pGain).connect(voiceGain);
        osc.start(time);
        osc.stop(time + decay + 0.1);

        oscs.push(osc);
        oscGains.push(pGain);
      });

      // Cleanup nodes after decay to prevent memory leakage
      setTimeout(() => {
        try {
          voiceGain.disconnect();
          voiceFilter.disconnect();
          oscs.forEach(osc => osc.disconnect());
          oscGains.forEach(g => g.disconnect());
        } catch(e) {}
      }, (decay + 0.5) * 1000);
    }

    function audioOnInhale(){
      if (!audioReady || !audioUnlocked) return;
      const now = audioCtx.currentTime;
      
      // Quiet down the background bed slightly to let the bell ping ring out beautifully
      rampParam(bedGain.gain, 0.12, 0.45);
      
      // Single light, opening temple bell ping at E5 (659.25 Hz)
      triggerTemplePing({
        time: now + 0.02,
        baseFreq: 659.25,
        partials: TEMPLE_PARTIALS,
        volume: 0.065,
        decay: 3.5,
        pan: -0.15
      });
    }

    function audioOnExhale(){
      if (!audioReady || !audioUnlocked) return;
      const now = audioCtx.currentTime;
      
      // Settle the background bed
      rampParam(bedGain.gain, 0.14, 1.2);
      
      // Single deeper, settling temple bell ping at A4 (440.0 Hz)
      triggerTemplePing({
        time: now + 0.02,
        baseFreq: 440.0,
        partials: TEMPLE_PARTIALS,
        volume: 0.075,
        decay: 4.5,
        pan: 0.15
      });
    }

    function audioSoftChime(){
      if (!audioReady || !audioUnlocked) return;
      const now = audioCtx.currentTime;
      
      // Double ping (ting-sha meditation bells): two cymbals ringing together with a slight offset
      // tuned to a bright, clear G5 (784.0 Hz) and a slightly detuned partner G5 (787.5 Hz)
      // to create a beautiful, organic beating resonance.
      triggerTemplePing({
        time: now,
        baseFreq: 784.0,
        partials: TEMPLE_PARTIALS,
        volume: 0.055,
        decay: 4.0,
        pan: -0.2
      });

      triggerTemplePing({
        time: now + 0.24,
        baseFreq: 787.5,
        partials: TEMPLE_PARTIALS,
        volume: 0.055,
        decay: 4.0,
        pan: 0.2
      });
    }

    soundToggle.addEventListener("click", async (event) => {
      event.stopPropagation();
      soundToggleClick = true;
      await tryStartAudio();
      setTimeout(() => { soundToggleClick = false; }, 100);
    });

    window.addEventListener("pointerdown", async () => {
      if (soundToggleClick) return;
      await tryStartAudio();
    }, { once: true });

    setTimeout(() => {
      tryStartAudio();
      if (!audioUnlocked){
        setTimeout(() => {
          if (!audioUnlocked) soundToggle.classList.add("show");
        }, 900);
      }
    }, 120);

    runBreathing();
  </script>
</body>
